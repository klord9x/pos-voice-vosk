<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Test Welcome Scroll — auto-nudge lock</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  height:auto;
  min-height:100%;
  overflow:auto;
  overscroll-behavior-x:none;
  -webkit-overflow-scrolling:touch;
  font-family:system-ui,sans-serif;
}
.welcome{
  min-height:150vh;
  background:linear-gradient(180deg, #1B1B1B 0%, #333 50%, #1B1B1B 100%);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}
.section{
  width:100%;
  max-width:520px;
  margin:0 auto;
  padding:40px 20px;
  text-align:center;
  color:#fff;
}
.section-1{min-height:80vh;display:flex;flex-direction:column;justify-content:center;}
.section-2{
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;justify-content:center;border-top:1px solid #444;
}
.logo{font-size:80px;margin-bottom:20px;}
.title{font-size:28px;font-weight:700;margin-bottom:12px;}
.hint{font-size:16px;color:#aaa;margin-bottom:30px;}
.arrow{font-size:40px;color:#0A84FF;animation:bounce 1.2s infinite;}
.note{font-size:14px;color:#666;margin-top:40px;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(12px);}}

html.locked, body.locked { touch-action: none; }
.status{
  position:fixed;bottom:8px;left:8px;right:8px;z-index:999;
  font-size:11px;color:#0F0;font-family:monospace;
  background:rgba(0,0,0,.6);padding:6px 8px;border-radius:6px;
  pointer-events:none;white-space:pre-wrap;
}
</style>
<base target="_blank">
</head>
<body>

<div class="welcome">
  <div class="section section-1">
    <div class="logo">🎤</div>
    <div class="title">POS Giọng Nói</div>
    <div class="hint">Vuốt xuống để tiếp tục</div>
    <div class="arrow">↓</div>
  </div>
  <div class="section section-2" id="mainSection">
    <div class="hint">Nội dung tiếp theo...</div>
    <div class="note">Nếu Chrome iOS ẩn được address bar, bạn sẽ thấy màn hình tràn viền</div>
  </div>
</div>

<div class="status" id="status">baseline: đang đo…</div>

<script>
(function(){
  var statusEl = document.getElementById('status');
  var mainSection = document.getElementById('mainSection');
  var vv = window.visualViewport;
  var baseline = vv ? vv.height : window.innerHeight;
  var locked = false;
  var lockY = 0;

  function log(msg){ statusEl.textContent = msg; }
  log('baseline: ' + Math.round(baseline) + 'px — cuộn xuống đi...');

  function preventScroll(e){ e.preventDefault(); }

  function nudgeDown(){
    // Mở khóa tạm để cho phép scroll
    document.documentElement.style.overflow = 'auto';
    document.body.style.overflow = 'auto';
    // Cuộn xuống 2px để kích hoạt Chrome ẩn bar
    window.scrollTo(0, window.scrollY + 2);
    // Đợi Chrome phản ứng rồi khóa lại
    setTimeout(function(){
      if(!locked) return;
      document.documentElement.style.overflow = 'hidden';
      document.body.style.overflow = 'hidden';
      // Kiểm tra lại viewport
      var h = vv ? vv.height : window.innerHeight;
      if(h - baseline < 30){
        // Vẫn chưa ẩn, thử lại
        setTimeout(nudgeDown, 300);
      }
    }, 400);
  }

  function lockHere(reason){
    if(locked) return;
    locked = true;
    lockY = window.scrollY;

    document.documentElement.classList.add('locked');
    document.body.classList.add('locked');
    document.documentElement.style.overflow = 'hidden';
    document.body.style.overflow = 'hidden';
    document.addEventListener('touchmove', preventScroll, { passive: false });
    document.addEventListener('touchstart', preventScroll, { passive: false });

    window.removeEventListener('scroll', onScroll);

    var h = vv ? vv.height : window.innerHeight;
    log('🔒 LOCKED (' + reason + ') tại scrollY=' + Math.round(lockY) +
        ' | viewport=' + Math.round(h) + 'px (+' + Math.round(h - baseline) + 'px)');
  }

  function onViewportResize(){
    var current = vv ? vv.height : window.innerHeight;
    if(!locked){
      log('viewport=' + Math.round(current) + 'px | scrollY=' + Math.round(window.scrollY));
      if(current - baseline > 30 && window.scrollY > 0){
        lockHere('viewport-resize (bar đã ẩn)');
      }
      return;
    }
    // Đã locked — watchdog: nếu bar hiện lại (viewport co) → tự cuộn xuống ẩn lại
    if(current - baseline < 30){
      log('⚠️ bar hiện lại (viewport=' + Math.round(current) + 'px) → tự nudge xuống...');
      nudgeDown();
    } else {
      log('🔒 locked, viewport=' + Math.round(current) + 'px (+' + Math.round(current - baseline) + 'px)');
    }
  }

  function onScroll(){
    if(locked) return;
    var current = vv ? vv.height : window.innerHeight;
    if(current - baseline > 30 && window.scrollY > 0){
      lockHere('scroll + viewport tăng');
      return;
    }
    var deepInMain = window.scrollY > (mainSection.offsetTop + 40);
    if(deepInMain){
      lockHere('scroll sâu vào main (fallback)');
    }
  }

  if(vv) vv.addEventListener('resize', onViewportResize);
  else window.addEventListener('resize', onViewportResize);
  window.addEventListener('scroll', onScroll, { passive: true });
})();
</script>
</body>
</html>
