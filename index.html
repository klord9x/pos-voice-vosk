<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Test — user scroll when bar shows</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  height:auto;
  min-height:100%;
  overflow:auto;
  overscroll-behavior-x:none;
  -webkit-overflow-scrolling:touch;
  font-family:system-ui,sans-serif;
}

.welcome{
  position:absolute;
  top:0;left:0;right:0;
  height:100vh;
  height:100dvh;
  background:linear-gradient(180deg, #1B1B1B 0%, #333 100%);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding-top:env(safe-area-inset-top);
  padding-bottom:40px;
  z-index:1;
}
.logo{font-size:80px;margin-bottom:20px;}
.title{font-size:28px;font-weight:700;color:#fff;margin-bottom:12px;}
.hint{font-size:16px;color:#aaa;margin-bottom:30px;}
.arrow{font-size:40px;color:#0A84FF;animation:bounce 1.2s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(12px);}}

.main{
  position:absolute;
  top:100vh;
  top:100dvh;
  left:0;right:0;
  min-height:100vh;
  min-height:100dvh;
  background:#1B1B1B;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
  z-index:2;
}
.main-hint{font-size:18px;color:#fff;margin-bottom:12px;}
.main-note{font-size:14px;color:#666;text-align:center;}

.spacer{height:200vh;height:200dvh;}

html.locked, body.locked {
  overflow: hidden !important;
  touch-action: none !important;
  overscroll-behavior: none !important;
}

.status{
  position:fixed;bottom:8px;left:8px;right:8px;z-index:999;
  font-size:11px;color:#0F0;font-family:monospace;
  background:rgba(0,0,0,.6);padding:6px 8px;border-radius:6px;
  pointer-events:none;white-space:pre-wrap;
}
</style>
<base target="_blank">
</head>
<body>

<div class="welcome" id="welcome">
  <div class="logo">🎤</div>
  <div class="title">POS Giọng Nói</div>
  <div class="hint">Vuốt xuống để tiếp tục</div>
  <div class="arrow">↓</div>
</div>

<div class="main" id="main">
  <div class="main-hint">✅ Đã vào màn hình chính</div>
  <div class="main-note">Bar ẩn = khóa scroll.<br>Bar hiện = mở scroll cho bạn tự cuộn xuống lại.</div>
</div>

<div class="spacer"></div>

<div class="status" id="status">baseline: đang đo…</div>

<script>
(function(){
  var statusEl = document.getElementById('status');
  var vv = window.visualViewport;
  var baseline = vv ? vv.height : window.innerHeight;
  var locked = false;

  function log(msg){ statusEl.textContent = msg; }
  log('baseline: ' + Math.round(baseline) + 'px — cuộn xuống đi...');

  function preventScroll(e){ e.preventDefault(); }

  function lock(){
    document.documentElement.classList.add('locked');
    document.body.classList.add('locked');
    document.documentElement.style.overflow = 'hidden';
    document.body.style.overflow = 'hidden';
    document.addEventListener('touchmove', preventScroll, { passive: false });
    document.addEventListener('touchstart', preventScroll, { passive: false });
  }

  function unlock(){
    document.documentElement.classList.remove('locked');
    document.body.classList.remove('locked');
    document.documentElement.style.overflow = 'auto';
    document.body.style.overflow = 'auto';
    document.removeEventListener('touchmove', preventScroll);
    document.removeEventListener('touchstart', preventScroll);
  }

  function goToMain(){
    window.scrollTo(0, window.innerHeight);
  }

  function onViewportResize(){
    var current = vv ? vv.height : window.innerHeight;
    var barHidden = current - baseline > 30;

    if(!locked && barHidden && window.scrollY > 50){
      // Bar ẩn lần đầu → lock
      locked = true;
      goToMain();
      setTimeout(lock, 100);
      log('🔒 LOCKED | viewport=' + Math.round(current) + 'px (+' + Math.round(current - baseline) + 'px)');
      return;
    }

    if(locked){
      if(!barHidden){
        // Bar hiện lại → unlock cho user tự scroll
        locked = false;
        unlock();
        log('🔓 UNLOCKED — bar hiện, cuộn xuống để ẩn lại');
      } else {
        log('🔒 locked, viewport=' + Math.round(current) + 'px');
      }
    }
  }

  function onScroll(){
    if(locked) return;
    var current = vv ? vv.height : window.innerHeight;
    if(current - baseline > 30 && window.scrollY > window.innerHeight * 0.6){
      locked = true;
      goToMain();
      setTimeout(lock, 100);
      log('🔒 LOCKED (scroll) | viewport=' + Math.round(current) + 'px');
    }
  }

  if(vv) vv.addEventListener('resize', onViewportResize);
  else window.addEventListener('resize', onViewportResize);
  window.addEventListener('scroll', onScroll, { passive: true });
})();
</script>
</body>
</html>
